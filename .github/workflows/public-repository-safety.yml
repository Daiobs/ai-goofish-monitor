name: Public repository safety

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  public-repository-safety:
    name: Public repository safety
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout complete repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install system dependency
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libzbar0

      - name: Install locked safety tooling
        run: python -m pip install --require-hashes -r requirements-ci.txt

      - name: Test public safety helpers
        run: |
          python -m pytest \
            tests/ci/test_public_repo_safety.py \
            tests/ci/test_detect_secrets.py \
            tests/ci/test_git_range_safety.py \
            -p scripts.ci.pytest_network_guard \
            --disable-socket \
            --allow-hosts=localhost,127.0.0.1,::1 \
            --allow-unix-socket

      - name: Check tracked files and workflow policy
        run: python scripts/ci/check_public_repo_safety.py --repo-root .

      - name: Scan every commit in the event range
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || '' }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event_name == 'push' && github.sha || '' }}
        run: |
          python scripts/ci/check_git_range_safety.py \
            --repo-root . \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --file-allowlist ci/public-file-allowlist.txt

      - name: Scan tracked repository for secrets
        run: |
          python scripts/ci/check_detect_secrets.py \
            --repo-root . \
            --baseline .secrets.baseline \
            --secret-allowlist ci/public-secret-allowlist.yml
