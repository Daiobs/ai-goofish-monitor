name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.1.38"

      - name: Prepare Environment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config_dir = Path.home() / ".claude-code-router"
          config_dir.mkdir(parents=True, exist_ok=True)
          config = {
              "log": True,
              "NON_INTERACTIVE_MODE": True,
              "OPENAI_API_KEY": os.environ["OPENAI_API_KEY"],
              "OPENAI_BASE_URL": "https://api-inference.modelscope.cn/v1",
              "OPENAI_MODEL": "MiniMax/MiniMax-M2.5",
          }
          (config_dir / "config.json").write_text(json.dumps(config), encoding="utf-8")
          PY
        shell: bash

      - name: Start Claude Code Router
        run: |
          nohup bunx @musistudio/claude-code-router@1.0.8 start &
        shell: bash

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
        with:
          anthropic_api_key: "Any-string-is-ok"
