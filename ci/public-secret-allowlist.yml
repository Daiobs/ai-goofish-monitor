version: 1
entries:
  - path: .github/workflows/claude.yml
    pattern: '\x41ny-string-is-ok'
    reason: Fixed non-secret placeholder required by the local router action.
  - path: tests/ci/test_public_repo_safety.py
    pattern: '\x73k-test-ci-fixture-1234567890abcdef'
    reason: Synthetic token used to prove exact test-fixture allowlisting.
  - path: tests/integration/test_api_auth.py
    pattern: '\x73ecurity-test-password'
    reason: Synthetic authentication fixture.
  - path: tests/integration/test_api_auth.py
    pattern: '\x73ecurity-test-session-(?:secret)-0123456789-(?:ABCDEF)'
    reason: Synthetic session-signing fixture.
  - path: tests/integration/test_api_auth.py
    pattern: '\x77rong-password'
    reason: Deliberately invalid password fixture.
  - path: tests/integration/test_api_settings.py
    pattern: '"OPENAI_API_KEY": "\x64emo"'
    reason: Non-secret API settings fixture value.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x68ttps://url-(?:user):url-(?:password)@passport\.goofish\.com/login\.htm'
    reason: Synthetic URL userinfo redaction fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x65yJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiJ1c2VyIn0\.signature123'
    reason: Synthetic JWT-shaped redaction fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x73k-test-secret'
    reason: Synthetic quoted API key fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x70assword-secret'
    reason: Synthetic quoted password fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x61pi-key-secret'
    reason: Synthetic API key fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x70reflight-secret'
    reason: Synthetic preflight error fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x68ttp://preflight-(?:user):preflight-(?:password)@proxy\.example:8080'
    reason: Synthetic proxy userinfo fixture.
  - path: tests/integration/test_scraper_failure_propagation.py
    pattern: '\x68ttp://(?:username):(?:password)@proxy\.example:8080'
    reason: Synthetic proxy userinfo fixture.
  - path: web-ui/src/i18n/messages/en-US-extra.ts
    pattern: '\x4ceave blank to keep the current value, or enter a new value to overwrite it'
    reason: User-interface copy, not a credential.
  - path: web-ui/src/i18n/messages/en-US-extra.ts
    pattern: '\x4ceave blank to keep the current value'
    reason: User-interface copy, not a credential.
  - path: web-ui/src/i18n/messages/en-US.ts
    pattern: 'password: ''\x50assword'''
    reason: User-interface field label, not a credential.
